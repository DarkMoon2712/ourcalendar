<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nuestro Calendario</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&family=Lexend:wght@100..900&family=Oooh+Baby&display=swap" rel="stylesheet">

</head>

<body>

<div class="floating-hearts"></div>

<h1>Nuestro Calendario</h1>

<p class="subtitle">26/01/2026 — ...</p>

<div class="calendar" id="calendar"></div>

<div class="modal" id="modal">

<div class="modal-card">

<h2 id="modalDate"></h2>

<p id="modalText"></p>

<div class="modal-buttons">

<button onclick="prevNote()">Anterior</button>
<button onclick="nextNote()">Siguiente</button>
<button onclick="closeModal()">Cerrar</button>

</div>

</div>

</div>

<audio id="loveSound" src="music.mp3"></audio>

<script src="script.js"></script>

</body>

</html>
